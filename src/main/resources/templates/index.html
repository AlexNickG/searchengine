  <div class="Middle">

            </div>
            <div style="display:flex;align-items:center;gap:12px;padding:8px 0;font-size:13px;font-family:'Montserrat',sans-serif;">

                    </div>
                    <div class="Statistics-block"><span class="Statistics-amount" id="totalPages"></span><span class="Statistics-title">pages</span>
                    </div>
                    <div class="Statistics-block"><span class="Statistics-amount" id="totalLemmas"></span><span class="Statistics-title">lemmas</span>

  <script src="/assets/plg/jQuery/jquery-3.5.1.min.js"></script>
  <script>
    (function () {
      var token = $('meta[name="_csrf"]').attr('content');
      var header = $('meta[name="_csrf_header"]').attr('content');
      $(document).ajaxSend(function (e, xhr) {
        if (token && header) xhr.setRequestHeader(header, token);
      });
    })();
  </script>
  <script>
    /* ---- Site Config Management ---- */
    var sitesApi = backendApiUrl + '/admin/sites';

    function loadSites() {
      $.getJSON(sitesApi, function (data) {
        var tbody = $('#sites-tbody').empty();
        if (!data || data.length === 0) {
          tbody.append('<tr><td colspan="3" style="padding:8px 10px;color:#999;">Сайты не добавлены</td></tr>');
          return;
        }
        data.forEach(function (s) {
          tbody.append(
            '<tr data-id="' + s.id + '">' +
              '<td style="padding:7px 10px;border-bottom:1px solid #eee;word-break:break-all;">' + $('<span>').text(s.url).html() + '</td>' +
              '<td style="padding:7px 10px;border-bottom:1px solid #eee;">' + $('<span>').text(s.name).html() + '</td>' +
              '<td style="padding:7px 10px;border-bottom:1px solid #eee;white-space:nowrap;">' +
                '<button class="btn btn_primary site-edit-btn" data-id="' + s.id + '" data-url="' + $('<span>').text(s.url).html() + '" data-name="' + $('<span>').text(s.name).html() + '" style="padding:3px 10px;font-size:12px;margin-right:4px;">Изменить</button>' +
                '<button class="btn site-del-btn" data-id="' + s.id + '" style="padding:3px 10px;font-size:12px;background:#e74c3c;color:#fff;border-color:#e74c3c;">Удалить</button>' +
              '</td>' +
            '</tr>'
          );
        });
      });
    }

    function resetSiteForm() {
      $('#site-edit-id').val('');
      $('#site-url-input').val('');
      $('#site-name-input').val('');
      $('#site-form-title').text('Добавить сайт');
      $('#site-cancel-btn').hide();
      $('#site-form-error').hide().text('');
    }

    $(document).on('click', '.site-edit-btn', function () {
      var $btn = $(this);
      $('#site-edit-id').val($btn.data('id'));
      $('#site-url-input').val($btn.data('url'));
      $('#site-name-input').val($btn.data('name'));
      $('#site-form-title').text('Изменить сайт');
      $('#site-cancel-btn').show();
      $('#site-form-error').hide();
      $('html, body').animate({ scrollTop: $('#site-form-wrap').offset().top - 20 }, 200);
    });

    $(document).on('click', '.site-del-btn', function () {
      var id = $(this).data('id');
      if (!confirm('Удалить сайт?')) return;
      $.ajax({
        url: sitesApi + '/' + id,
        type: 'DELETE',
        success: function () { loadSites(); },
        error: function () { alert('Ошибка при удалении'); }
      });
    });

    $('#site-cancel-btn').on('click', resetSiteForm);

    $('#site-save-btn').on('click', function () {
      var id  = $('#site-edit-id').val();
      var url = $.trim($('#site-url-input').val());
      var name = $.trim($('#site-name-input').val());
      var $err = $('#site-form-error');

      if (!url || !name) {
        $err.text('Заполните URL и название').show();
        return;
      }
      if (!/^https?:\/\/.+/.test(url)) {
        $err.text('URL должен начинаться с http:// или https://').show();
        return;
      }

      var method = id ? 'PUT' : 'POST';
      var endpoint = id ? sitesApi + '/' + id : sitesApi;

      $.ajax({
        url: endpoint,
        type: method,
        contentType: 'application/json',
        data: JSON.stringify({ url: url, name: name }),
        success: function () {
          resetSiteForm();
          loadSites();
        },
        error: function (xhr) {
          var msg = (xhr.responseJSON && xhr.responseJSON.message) ? xhr.responseJSON.message : 'Ошибка сохранения';
          $err.text(msg).show();
        }
      });
    });

    // Load sites when Management tab becomes active
    $('a[href="#management"]').on('click', function () {
      loadSites();
    });
    // Also load on page ready if management tab is active
    $(function () {
      if (window.location.hash === '#management') loadSites();
    });
  </script>
