server:
  port: 8080

spring:
  config:
    import: optional:file:./.env[.properties]
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: ${DB_URL:jdbc:postgresql://localhost:5432/parse}
    driver-class-name: org.postgresql.Driver
  jpa:
    database: postgresql
    properties:
      hibernate:
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true

      #dialect: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: none
    show-sql: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    drop-first: false

  output:
    ansi:
      enabled: ALWAYS

indexing-settings:
  sites:
    - url: http://localhost:8080/
      name: localhost (local)
#    - url:  https://nikoartgallery.com/
#      name: Art gallery
#    - url: https://et-cetera.ru/mobile/
#      name: Theatre Et Cetera
    #- url: https://ipfran.ru/
    #  name: IPF RAN
    # - url: https://dombulgakova.ru/
    #   name: Dom Bulgakova
    #- url: https://ya.ru/
    #  name: Yandex
  clearDb: true

connection-settings:
  #userAgent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/130.0.0.0 YaBrowser/24.12.0.0 Safari/537.36
  userAgent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
  #referrer: https://dombulgakova.ru/
  timeout: 50 # задержка между запросами (мс) — вежливость к серверу
  connectionTimeout: 20000  # таймаут чтения JSoup (мс) — для медленных страниц

