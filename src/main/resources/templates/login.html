<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Site Search Engine — Вход</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <link rel="preload" href="/assets/fonts/Montserrat/Montserrat-SemiBold.woff2" as="font" crossorigin="anonymous">
  <link rel="preload" href="/assets/fonts/Montserrat/Montserrat-Light.woff2" as="font" crossorigin="anonymous">
  <link rel="preload" href="/assets/fonts/Montserrat/Montserrat-Medium.woff2" as="font" crossorigin="anonymous">
  <link rel="stylesheet" href="/assets/css/fonts.css?v=82368483">
  <link rel="stylesheet" href="/assets/css/basic.css?v=82368483">
  <link rel="stylesheet" href="/assets/css/extra.css?v=82368483">
  <style>
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
    }
    .login-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.10);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
    }
    .login-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: #222;
      margin: 0 0 32px;
      text-align: center;
    }
    .login-label {
      display: block;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }
    .login-input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 15px;
      font-family: 'Montserrat', sans-serif;
      margin-bottom: 20px;
      transition: border-color 0.2s;
      outline: none;
    }
    .login-input:focus {
      border-color: #4A90D9;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: #4A90D9;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover {
      background: #357ABD;
    }
    .login-alert {
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Montserrat', sans-serif;
      margin-bottom: 20px;
      text-align: center;
    }
    .login-alert_error {
      background: #fdecea;
      color: #c0392b;
      border: 1px solid #f5c6cb;
    }
    .login-alert_success {
      background: #eafaf1;
      color: #27ae60;
      border: 1px solid #b7e4c7;
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1 class="login-title">Search Engine</h1>

    <div class="login-alert login-alert_error" th:if="${param.error}">
      Неверный логин или пароль
    </div>
    <div class="login-alert login-alert_success" th:if="${param.logout}">
      Вы вышли из системы
    </div>

    <form th:action="@{/login}" method="post">
      <label class="login-label" for="username">Логин</label>
      <input class="login-input" id="username" name="username" type="text"
             autocomplete="username" autofocus required/>

      <label class="login-label" for="password">Пароль</label>
      <input class="login-input" id="password" name="password" type="password"
             autocomplete="current-password" required/>

      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <button class="login-btn" type="submit">Войти</button>
    </form>
  </div>
</div>
</body>
</html>
